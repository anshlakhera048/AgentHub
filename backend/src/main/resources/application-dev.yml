# ========================================================
# AgentHub — Dev Profile (Phase 1: minimal dependencies)
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ========================================================
# Requires ONLY: Ollama running on localhost:11434
# No PostgreSQL, no Redis, no ChromaDB needed.

spring:
  # Use H2 in-memory database instead of PostgreSQL
  datasource:
    url: jdbc:h2:mem:agenthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  # Exclude Redis auto-configuration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable Redis and ChromaDB memory backends
agenthub:
  memory:
    redis:
      enabled: false
    chroma:
      enabled: false
    vector:
      enabled: true

logging:
  level:
    com.agenthub: DEBUG
