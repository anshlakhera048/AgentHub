server:
  port: 8080

spring:
  application:
    name: agenthub
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agenthub}
    username: ${DB_USER:agenthub}
    password: ${DB_PASSWORD:agenthub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# --- AgentHub Configuration ---
agenthub:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    default-model: ${OLLAMA_MODEL:mistral}
  memory:
    redis:
      enabled: ${MEMORY_REDIS_ENABLED:true}
    short-term:
      ttl-minutes: 60
      max-history: 10
    chroma:
      enabled: ${MEMORY_CHROMA_ENABLED:true}
      base-url: ${CHROMA_BASE_URL:http://localhost:8000}
      collection: agenthub_knowledge
      embedding-model: nomic-embed-text
    vector:
      enabled: ${MEMORY_VECTOR_ENABLED:false}
    embedding:
      model: ${EMBEDDING_MODEL:nomic-embed-text}
    ingestion:
      chunk-size: 500
      chunk-overlap: 50
    retrieval:
      default-top-k: 5
  tools:
    file-reader:
      base-dir: ./data
    http-client:
      timeout-seconds: 30
      allowed-domains: ""
    code-execution:
      enabled: false
      timeout-seconds: 10
  execution:
    thread-pool-size: ${EXECUTION_THREAD_POOL:8}
    node-timeout-seconds: ${EXECUTION_NODE_TIMEOUT:120}
  streaming:
    enabled: ${STREAMING_ENABLED:true}

# --- Resilience4j ---
resilience4j:
  retry:
    instances:
      llmClient:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - com.agenthub.llm.LLMException
          - java.util.concurrent.TimeoutException
  circuitbreaker:
    instances:
      llmClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      llmClient:
        timeout-duration: 120s

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: agenthub

# --- Logging ---
logging:
  level:
    com.agenthub: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
