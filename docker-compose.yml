services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- ChromaDB (Vector DB) ---
  chromadb:
    image: chromadb/chroma:latest
    container_name: agenthub-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  # --- Ollama (Local LLM) ---
  ollama:
    image: ollama/ollama:latest
    container_name: agenthub-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

  # --- Spring Boot Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenthub-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agenthub
      DB_USER: agenthub
      DB_PASSWORD: agenthub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_BASE_URL: http://chromadb:8000
      OLLAMA_MODEL: mistral
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- React Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenthub-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  chromadata:
  ollamadata:
